  /workspaces/{workspaceId}/activities/{activityId}:
    patch:
      summary: Update, reschedule, or complete an activity
      description: Set completedAt to complete an open activity. Open activities can edit title, type, dueAt, ownerId, and description. Completed activities reject normal edits. Deal-attached activities on closed deals and lead-attached activities on converted leads reject update, completion, and deletion; attachments cannot be changed.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/ActivityId"
      requestBody:
        content:
          application/json:
