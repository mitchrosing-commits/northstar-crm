      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a note
      description: Notes can attach to deals, leads, contacts, or organizations. Converted leads reject new notes.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
