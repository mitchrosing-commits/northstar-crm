  /workspaces/{workspaceId}/meeting-intakes:
    get:
      summary: List recent meeting intakes
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create and analyze a meeting intake
      description: Creates a persisted review record, extracts supported text/markdown/RTF/HTML/CSV/JSON/PDF/DOCX sources synchronously, queues configured image/scanned-PDF/audio/provider-capable video extraction, matches CRM records, and stores a reviewable proposal without mutating CRM data. Proposals can include notes, a completed meeting activity, follow-up activities, and review-first Relationship Brief updates for matched contacts. Relationship Brief proposal JSON may include individual facts with include flags, destination fields, sensitivity guidance, duplicate markers, and staleness warnings while preserving field-level proposal compatibility. When MEETING_INTELLIGENCE_RELATIONSHIP_PROVIDER=openai and OPENAI_API_KEY are configured, semantic Relationship Brief extraction can enrich matched-contact proposals with sensitivity guidance and provider warnings; missing or failed provider config falls back to deterministic proposals. The first-party internal media route can use OpenAI for image/whiteboard extraction and audio transcription when the internal route URL, bearer token, provider selector, and OpenAI API key are configured; scanned PDFs and video require another capable provider. Failed/provider-required intakes persist detected source type, original filename/MIME when provided, extraction method, conversion mode, required provider, failure code, and warnings in analysis JSON. Empty source submissions return 422 before an intake record is created.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/meeting-intakes/{intakeId}:
    get:
      summary: Get a meeting intake
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MeetingIntakeId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/meeting-intakes/{intakeId}/apply:
    post:
      summary: Apply selected meeting intake updates
      description: Applies only user-approved notes and activities. Existing workspace, record lifecycle, and audit behavior are enforced by the note/activity services. Already-applied intakes return the stored result without duplicating updates.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/MeetingIntakeId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeApplyInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/meeting-intake-upload-capabilities:
    get:
      summary: Get Meeting Intelligence upload capabilities
      description: Returns safe upload capability and policy information for the authenticated workspace before file bytes move. The response advertises direct upload availability, multipart availability and part policy, storage backend category, local and provider source support, max direct-upload and bounded app-upload sizes, unsupported source reasons, guidance strings, and retention without returning credentials, signed URLs, object keys, local paths, bucket names, provider tokens, filenames, payloads, or stored-file references.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Upload capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingIntakeUploadCapabilities"
  /workspaces/{workspaceId}/meeting-intake-upload-sessions:
    post:
      summary: Create a Meeting Intelligence direct upload session
      description: Creates a draft intake and a short-lived signed single-object PUT target for large S3/R2-backed provider files. The response includes upload instructions and limits but no storage credentials, local paths, or stored-file reference payload. Local filesystem storage, missing media provider configuration, and unsupported source/provider combinations fail clearly so clients can use the existing bounded base64 intake fallback.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeUploadSessionInput"
      responses:
        "201":
          description: Direct upload session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingIntakeUploadSession"
  /workspaces/{workspaceId}/meeting-intake-upload-sessions/{uploadSessionId}/finalize:
    post:
      summary: Finalize a Meeting Intelligence direct upload session
      description: Validates completion metadata against the draft intake and stored-file metadata, reads the private uploaded object through backend/expiry/byte-length/checksum validation, and queues provider extraction with a stored-file reference instead of fileBase64. Missing, expired, wrong-workspace, wrong-intake, wrong-source, wrong-size, or checksum-mismatched content fails before provider work is queued.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: uploadSessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeUploadSessionFinalizeInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/meeting-intake-multipart-upload-sessions:
    post:
      summary: Create a Meeting Intelligence multipart upload session
      description: Creates a draft intake, starts a private S3/R2-compatible multipart upload for a provider-backed file, and writes cleanup-visible stored-file metadata. The response includes safe session policy only: upload session id, accepted source type, part size/count, max parts, retention expiry, and per-part signing TTL. It does not return credentials, bucket names, object keys, local paths, signed URLs, stored-file references, filenames, or bytes.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeUploadSessionInput"
      responses:
        "201":
          description: Multipart upload session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingIntakeMultipartUploadSession"
  /workspaces/{workspaceId}/meeting-intake-multipart-upload-sessions/{uploadSessionId}/parts:
    post:
      summary: Sign Meeting Intelligence multipart upload parts
      description: Validates workspace, draft session state, stored-file metadata, requested part numbers, and expiry before returning short-lived signed PUT targets for specific multipart part numbers.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: uploadSessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeMultipartUploadPartsInput"
      responses:
        "200":
          description: Multipart part upload targets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeetingIntakeMultipartUploadParts"
  /workspaces/{workspaceId}/meeting-intake-multipart-upload-sessions/{uploadSessionId}/complete:
    post:
      summary: Complete a Meeting Intelligence multipart upload session
      description: Completes the object-storage multipart upload from validated part ETags, verifies size/source/checksum/workspace/intake/expiry metadata, and queues provider extraction with storedFile only. Repeated completion after queueing returns 409 and cannot create duplicate extraction jobs.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: uploadSessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeMultipartUploadCompleteInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/meeting-intake-multipart-upload-sessions/{uploadSessionId}/abort:
    post:
      summary: Abort a Meeting Intelligence multipart upload session
      description: Aborts an incomplete S3/R2-compatible multipart upload where supported, deletes stored-file metadata/content, and marks the draft intake failed so later completion is rejected.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: uploadSessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/email-logs:
    get:
      summary: List manual email logs
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a manual email log
      description: Email logs can attach to open deals, unconverted leads, contacts, or organizations. Closed deals and converted leads reject new manual email logs. This route records CRM history only and never sends email.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailLogInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/email-templates:
    get:
      summary: List email templates
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create an email template
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/email-templates/{templateId}:
    patch:
