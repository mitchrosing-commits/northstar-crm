openapi: 3.0.3
info:
  title: Northstar CRM API
  version: 0.1.0
  description: Workspace-scoped REST API for the Northstar CRM MVP.
servers:
  - url: /api/v1
security:
  - TrustedUserHeader: []
components:
  securitySchemes:
    TrustedUserHeader:
      type: apiKey
      in: header
      name: x-user-id
      description: Trusted upstream/session user id header or local session cookie. Local signup/login are browser-action flows; OAuth, SSO, API keys, and webhook subscriptions are not implemented yet. Password reset is browser-action based and not part of this workspace REST API.
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    PipelineId:
      name: pipelineId
      in: path
      required: true
      schema:
        type: string
    StageId:
      name: stageId
      in: path
      required: true
      schema:
        type: string
    DealId:
      name: dealId
      in: path
      required: true
      schema:
        type: string
    LeadId:
      name: leadId
      in: path
      required: true
      schema:
        type: string
    PersonId:
      name: personId
      in: path
      required: true
      schema:
        type: string
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: string
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
    MeetingIntakeId:
      name: intakeId
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
    LineItemId:
      name: lineItemId
      in: path
      required: true
      schema:
        type: string
    ContractStepId:
      name: contractStepId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    WorkspaceInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
    PipelineInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
          minimum: -2147483648
          maximum: 2147483647
    StageInput:
      type: object
      required: [name, sortOrder]
      properties:
        name:
          type: string
        probability:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        sortOrder:
          type: integer
          minimum: -2147483648
          maximum: 2147483647
    DealInput:
      type: object
      required: [pipelineId, stageId, title]
      properties:
        pipelineId:
          type: string
        stageId:
          type: string
        ownerId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        title:
          type: string
        valueCents:
          type: integer
          minimum: 0
          maximum: 2147483647
          nullable: true
        currency:
          type: string
          default: USD
        status:
          type: string
          enum: [OPEN, WON, LOST]
        expectedCloseAt:
          type: string
          format: date-time
          nullable: true
    DealLineItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          description: Active product ID in the same workspace.
        quantity:
          type: integer
          minimum: 1
          maximum: 2147483647
        description:
          type: string
          nullable: true
    CloseDealInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [WON, LOST]
        lostReason:
          type: string
          nullable: true
          maxLength: 1000
    DealContractStepInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [NDA, MSA, SOW]
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, SENT, SIGNED, BLOCKED, SKIPPED]
        ownerId:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 4000
        externalReference:
          type: string
          nullable: true
          maxLength: 500
    DealContractStepUpdateInput:
      type: object
      properties:
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, SENT, SIGNED, BLOCKED, SKIPPED]
        ownerId:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 4000
        externalReference:
          type: string
          nullable: true
          maxLength: 500
    QuoteAdjustmentsInput:
      type: object
      properties:
        discountType:
          type: string
          enum: [NONE, PERCENT, FIXED]
          default: NONE
        discountValue:
          type: integer
          minimum: 0
          maximum: 2147483647
          description: Basis points for PERCENT, cents for FIXED, or 0 for NONE.
          default: 0
        taxType:
          type: string
          enum: [NONE, PERCENT, FIXED]
          default: NONE
        taxValue:
          type: integer
          minimum: 0
          maximum: 2147483647
          description: Basis points for PERCENT, cents for FIXED, or 0 for NONE.
          default: 0
    LeadInput:
      type: object
      required: [title]
      properties:
        ownerId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        title:
          type: string
        source:
          type: string
          nullable: true
        status:
          type: string
          enum: [NEW, QUALIFIED, DISQUALIFIED]
          description: Writable lead statuses. Use the lead conversion endpoint to move a lead to CONVERTED.
    ConvertLeadInput:
      type: object
      required: [pipelineId, stageId]
      properties:
        pipelineId:
          type: string
        stageId:
          type: string
        title:
          type: string
          nullable: true
    PersonInput:
      type: object
      required: [firstName]
      properties:
        ownerId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
    OrganizationInput:
      type: object
      required: [name]
      properties:
        ownerId:
          type: string
          nullable: true
        name:
          type: string
        domain:
          type: string
          nullable: true
    MeetingIntakeInput:
      type: object
      description: Creates a review-first meeting intake. Requests must include pasted text, extracted file text, uploaded PDF/DOCX bytes, or artifact filename/MIME metadata; empty source submissions return 422 before a record is created. Text, markdown, RTF, HTML, CSV, JSON, text-based PDF, and DOCX sources process locally; scanned PDF/image/audio/video processors return clear provider-required failures with processor status metadata until integrations exist. PPTX and XLSX return clear conversion-required failures until a direct local parser exists.
      properties:
        explicitSourceType:
          type: string
          enum: [pasted_text, markdown, text_file, rtf, html, csv, json, pdf, docx, pptx, xlsx, image, audio, video, unsupported]
        originalFilename:
          type: string
          nullable: true
        originalMimeType:
          type: string
          nullable: true
        contextText:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
        fileText:
          type: string
          nullable: true
        fileBase64:
          type: string
          nullable: true
          description: Base64-encoded file bytes for bounded local PDF/DOCX extraction. Original binary files are not stored.
        hints:
          type: object
          additionalProperties: true
    MeetingIntakeApplyInput:
      type: object
      description: Edited/selected proposal payload. Only selected updates are applied through existing note/activity services. Proposal targets may be reassigned to known CRM records or cleared; unavailable, locked, deleted, or cross-workspace targets are skipped with clear reasons.
      properties:
        meetingActivity:
          type: object
          nullable: true
          additionalProperties: true
        notes:
          type: array
          items:
            type: object
            additionalProperties: true
        nextStepActivities:
          type: array
          items:
            type: object
            additionalProperties: true
    ProductInput:
      type: object
      required: [name, unitPriceCents]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        unitPriceCents:
          type: integer
          minimum: 0
          maximum: 2147483647
        currency:
          type: string
          default: USD
    ActivityInput:
      type: object
      description: Activity follow-ups must attach to at least one Deal, Lead, Contact/Person, or Organization in the workspace.
      required: [type, title]
      properties:
        ownerId:
          type: string
          nullable: true
        dealId:
          type: string
          nullable: true
        leadId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        type:
          type: string
          enum: [CALL, EMAIL, MEETING, TASK]
        title:
          type: string
        description:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
    NoteInput:
      type: object
      description: Notes must attach to at least one Deal, Lead, Contact/Person, or Organization in the workspace.
      required: [body]
      properties:
        dealId:
          type: string
          nullable: true
        leadId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        body:
          type: string
    EmailLogInput:
      type: object
      required: [subject, body, direction, occurredAt]
      description: Manual email logging only. This does not send email, sync inboxes, process inbound email, or create background jobs.
      properties:
        dealId:
          type: string
          nullable: true
        leadId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        subject:
          type: string
        body:
          type: string
        direction:
          type: string
          enum: [INBOUND, OUTBOUND]
        occurredAt:
          type: string
          format: date-time
        fromText:
          type: string
          nullable: true
        toText:
          type: string
          nullable: true
        ccText:
          type: string
          nullable: true
    EmailTemplateInput:
      type: object
      required: [name, subject, body]
      description: Workspace-scoped reusable text for manual email logs only. No sending or merge variables are implemented.
      properties:
        name:
          type: string
        subject:
          type: string
        body:
          type: string
    CustomFieldInput:
      type: object
      required: [entityType, name, key, fieldType]
      description: MVP custom field definition creation is limited to Deal, Contact/Person, Organization, and Lead fields.
      properties:
        entityType:
          type: string
          enum: [DEAL, PERSON, ORGANIZATION, LEAD]
        name:
          type: string
        key:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        fieldType:
          type: string
          enum: [TEXT, NUMBER, DATE, BOOLEAN, SELECT]
          description: Single-select fields are validated against configured string options when options are provided. Future unsupported definitions remain read-only.
        required:
          type: boolean
        options:
          nullable: true
    CustomFieldDefinition:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        entityType:
          type: string
          enum: [DEAL, LEAD, PERSON, ORGANIZATION]
        name:
          type: string
        key:
          type: string
        fieldType:
          type: string
          enum: [TEXT, NUMBER, DATE, BOOLEAN, SELECT, MULTI_SELECT, URL]
        required:
          type: boolean
        options:
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CustomFieldValuesInput:
      type: object
      required: [entityType, entityId, values]
      description: Updates custom field values for one Deal, Contact/Person, Organization, or unconverted Lead record.
      properties:
        entityType:
          type: string
          enum: [DEAL, PERSON, ORGANIZATION, LEAD]
        entityId:
          type: string
          description: Deal ID when entityType is DEAL, Contact/Person ID when entityType is PERSON, Organization ID when entityType is ORGANIZATION, or Lead ID when entityType is LEAD.
        values:
          type: object
          additionalProperties: true
          description: Map of custom field definition IDs to values.
      example:
        entityType: LEAD
        entityId: lead_123
        values:
          field_text_123: "High urgency"
          field_number_123: 42
          field_date_123: "2026-07-15"
          field_boolean_123: true
  responses:
    Ok:
      description: Successful response.
    Created:
      description: Created response.
    NoContent:
      description: No content.
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
paths:
  /workspaces:
    get:
      summary: List workspaces for the actor
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}:
    get:
      summary: Get a workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/pipelines:
    get:
      summary: List pipelines with stages and stage deals
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/pipelines/{pipelineId}:
    patch:
      summary: Update a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      summary: Soft delete a pipeline
      description: Returns a conflict while active deals still reference the pipeline.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "409":
          $ref: "#/components/responses/Error"
  /workspaces/{workspaceId}/pipelines/{pipelineId}/stages:
    get:
      summary: List stages for a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a stage in a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/stages/{stageId}:
    patch:
      summary: Update a stage
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/StageId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      summary: Soft delete a stage
      description: Returns a conflict while active deals still reference the stage.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/StageId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "409":
          $ref: "#/components/responses/Error"
  /workspaces/{workspaceId}/deals:
    get:
      summary: List deals
      description: Returns the workspace-scoped deal list snapshot. Browser list filters are not accepted on this REST list endpoint; use `/workspaces/{workspaceId}/exports/deals` for filtered all-row CSV downloads.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a deal
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/deals/{dealId}:
    get:
      summary: Get a deal with related records
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    patch:
      summary: Update an open deal
      description: Also supports stage movement inside the deal's current pipeline. Closed deals reject normal updates.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      summary: Soft delete a deal
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
  /workspaces/{workspaceId}/deals/{dealId}/close:
    post:
      summary: Mark a deal won or lost
      description: Preserves pipeline/stage and writes deal.won or deal.lost audit events.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseDealInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/deals/{dealId}/reopen:
    post:
      summary: Reopen a won or lost deal
      description: Sets a won or lost deal back to OPEN, preserves pipeline/stage, and writes a deal.reopened audit event. OPEN deals return a conflict-style error.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/deals/{dealId}/line-items:
    post:
      summary: Add a deal line item
      description: Snapshots product name, price, currency, and quantity onto the deal line item without changing deal value.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealLineItemInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/deals/{dealId}/contracts:
    get:
      summary: List deal contract workflow steps
      description: Returns workspace-scoped NDA, MSA, and SOW contract-step rows saved for the deal.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a deal contract workflow step
      description: Creates one NDA, MSA, or SOW step for the deal. Forward-moving MSA/SOW statuses require prior steps to be signed or skipped.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealContractStepInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/deals/{dealId}/quotes:
    post:
      summary: Create an internal quote draft from deal line items
      description: Requires at least one deal line item and one currency. Quote items snapshot current deal line items.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/DealId"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/deal-line-items/{lineItemId}:
    delete:
      summary: Remove a deal line item
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/LineItemId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
  /workspaces/{workspaceId}/contract-steps/{contractStepId}:
    patch:
      summary: Update a deal contract workflow step
      description: Updates local CRM tracking fields only. OpenContracts templates, document generation/storage, and e-signatures are not implemented.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/ContractStepId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealContractStepUpdateInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/quotes/{quoteId}/mark-sent:
    post:
      summary: Mark a draft quote sent
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/QuoteId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/quotes/{quoteId}/accept:
    post:
      summary: Mark an internal quote accepted
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/QuoteId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/quotes/{quoteId}/decline:
    post:
      summary: Mark an internal quote declined
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/QuoteId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/quotes/{quoteId}/adjustments:
    patch:
      summary: Update draft quote-level discount and tax adjustments
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/QuoteId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteAdjustmentsInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/quotes/{quoteId}/public-link:
    post:
      summary: Create or return the active public quote link for a sent quote
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/QuoteId"
      responses:
        "201":
          $ref: "#/components/responses/Created"
    delete:
      summary: Revoke the active public quote link
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/QuoteId"
