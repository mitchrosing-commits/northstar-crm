        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/custom-fields:
    get:
      summary: List custom field definitions
      description: Lists workspace custom field definitions. Deal, Contact/Person, Organization, and Lead fields are currently surfaced in the UI.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          description: Custom field definitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldDefinition"
        "403":
          $ref: "#/components/responses/Error"
    post:
      summary: Create a custom field definition
      description: Creates a Deal, Contact/Person, Organization, or Lead custom field definition. Supported editable field types are TEXT, NUMBER, DATE, BOOLEAN, and SELECT.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomFieldInput"
      responses:
        "201":
          description: Custom field definition created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomFieldDefinition"
        "403":
          $ref: "#/components/responses/Error"
        "422":
          description: Validation error, such as unsupported entity type, unsupported field type, or invalid key format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /workspaces/{workspaceId}/custom-field-values:
    patch:
      summary: Update Deal, Contact, Organization, or Lead custom field values
      description: Updates values for open Deal, Contact/Person, Organization, or unconverted Lead custom fields. Closed deals and converted leads reject custom field value updates. Values are validated by field type, including single-select values against configured string options when options are provided. Unsupported future field types are read-only and return a validation-style error if submitted.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomFieldValuesInput"
      responses:
        "200":
          description: Updated custom field definitions with current values included.
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/CustomFieldDefinition"
                    - type: object
                      properties:
                        values:
                          type: array
                          items:
                            type: object
        "403":
          $ref: "#/components/responses/Error"
        "404":
          description: Record or custom field definition was not found in the workspace, or the field definition does not match the requested entity type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Closed deal or converted lead cannot be updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error, such as invalid entity type, invalid value for field type, missing required value, or read-only unsupported field type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
