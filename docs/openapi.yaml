        - $ref: "#/components/parameters/WorkspaceId"
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailTemplateInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/email-templates/{templateId}/deactivate:
    post:
      summary: Deactivate an email template
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/email-templates/{templateId}/activate:
    post:
      summary: Reactivate an email template
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: templateId
          in: path
