      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create and analyze a meeting intake
      description: Creates a persisted review record, extracts supported text/markdown/RTF/HTML/CSV/JSON/PDF/DOCX sources, matches CRM records, and stores a reviewable proposal without mutating CRM data. Failed/provider-required intakes persist detected source type, original filename/MIME when provided, extraction method, conversion mode, required provider, failure code, and warnings in analysis JSON. Empty source submissions return 422 before an intake record is created.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MeetingIntakeInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
