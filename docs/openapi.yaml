openapi: 3.0.3
info:
  title: Northstar CRM API
  version: 0.1.0
  description: Workspace-scoped REST API for the Northstar CRM MVP.
servers:
  - url: /api/v1
security:
  - TrustedUserHeader: []
components:
  securitySchemes:
    TrustedUserHeader:
      type: apiKey
      in: header
      name: x-user-id
      description: Trusted upstream/session user id header or local session cookie. Local signup/login are browser-action flows; OAuth, SSO, API keys, and webhook subscriptions are not implemented yet. Password reset is browser-action based and not part of this workspace REST API.
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    PipelineId:
      name: pipelineId
      in: path
      required: true
      schema:
        type: string
    StageId:
      name: stageId
      in: path
      required: true
      schema:
        type: string
    DealId:
      name: dealId
      in: path
      required: true
      schema:
        type: string
    LeadId:
      name: leadId
      in: path
      required: true
      schema:
        type: string
    PersonId:
      name: personId
      in: path
      required: true
      schema:
        type: string
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
    ActivityId:
      name: activityId
      in: path
      required: true
      schema:
        type: string
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
    MeetingIntakeId:
      name: intakeId
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
    QuoteId:
      name: quoteId
      in: path
      required: true
      schema:
        type: string
    LineItemId:
      name: lineItemId
      in: path
      required: true
      schema:
        type: string
    ContractStepId:
      name: contractStepId
      in: path
      required: true
      schema:
        type: string
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              nullable: true
    WorkspaceInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
    PipelineInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
          minimum: -2147483648
          maximum: 2147483647
    StageInput:
      type: object
      required: [name, sortOrder]
      properties:
        name:
          type: string
        probability:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        sortOrder:
          type: integer
          minimum: -2147483648
          maximum: 2147483647
    DealInput:
      type: object
      required: [pipelineId, stageId, title]
      properties:
        pipelineId:
          type: string
        stageId:
          type: string
        ownerId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        title:
          type: string
        valueCents:
          type: integer
          minimum: 0
          maximum: 2147483647
          nullable: true
        currency:
          type: string
          default: USD
        status:
          type: string
          enum: [OPEN, WON, LOST]
        expectedCloseAt:
          type: string
          format: date-time
          nullable: true
    DealLineItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          description: Active product ID in the same workspace.
        quantity:
          type: integer
          minimum: 1
          maximum: 2147483647
        description:
          type: string
          nullable: true
    CloseDealInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [WON, LOST]
        lostReason:
          type: string
          nullable: true
          maxLength: 1000
    DealContractStepInput:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [NDA, MSA, SOW]
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, SENT, SIGNED, BLOCKED, SKIPPED]
        ownerId:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 4000
        externalReference:
          type: string
          nullable: true
          maxLength: 500
    DealContractStepUpdateInput:
      type: object
      properties:
        status:
          type: string
          enum: [NOT_STARTED, IN_PROGRESS, SENT, SIGNED, BLOCKED, SKIPPED]
        ownerId:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
          maxLength: 4000
        externalReference:
          type: string
          nullable: true
          maxLength: 500
    QuoteAdjustmentsInput:
      type: object
      properties:
        discountType:
          type: string
          enum: [NONE, PERCENT, FIXED]
          default: NONE
        discountValue:
          type: integer
          minimum: 0
          maximum: 2147483647
          description: Basis points for PERCENT, cents for FIXED, or 0 for NONE.
          default: 0
        taxType:
          type: string
          enum: [NONE, PERCENT, FIXED]
          default: NONE
        taxValue:
          type: integer
          minimum: 0
          maximum: 2147483647
          description: Basis points for PERCENT, cents for FIXED, or 0 for NONE.
          default: 0
    LeadInput:
      type: object
      required: [title]
      properties:
        ownerId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        title:
          type: string
        source:
          type: string
          nullable: true
        status:
          type: string
          enum: [NEW, QUALIFIED, DISQUALIFIED]
          description: Writable lead statuses. Use the lead conversion endpoint to move a lead to CONVERTED.
    ConvertLeadInput:
      type: object
      required: [pipelineId, stageId]
      properties:
        pipelineId:
          type: string
        stageId:
          type: string
        title:
          type: string
          nullable: true
    PersonInput:
      type: object
      required: [firstName]
      properties:
        ownerId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        relationshipPersonalContext:
          type: string
          nullable: true
          maxLength: 2000
        relationshipCommunicationStyle:
          type: string
          nullable: true
          maxLength: 2000
        relationshipBusinessConcerns:
          type: string
          nullable: true
          maxLength: 2000
        relationshipFollowUpReminders:
          type: string
          nullable: true
          maxLength: 2000
        relationshipInternalGuidance:
          type: string
          nullable: true
          maxLength: 2000
    OrganizationInput:
      type: object
      required: [name]
      properties:
        ownerId:
          type: string
          nullable: true
        name:
          type: string
        domain:
          type: string
          nullable: true
    MeetingIntakeInput:
      type: object
      description: Creates a review-first meeting intake. Requests must include pasted text, extracted file text, uploaded PDF/DOCX/provider-backed bytes, or artifact filename/MIME metadata; empty source submissions return 422 before a record is created. Text, markdown, RTF, HTML, CSV, JSON, text-based PDF, and DOCX sources process locally. Image, scanned/image-only PDF after local text extraction returns empty, audio, and provider-capable video sources are stored in the configured private Meeting Intelligence file storage backend, local filesystem or S3/R2-compatible object storage, and queue provider extraction with a storage reference, not large base64 job payloads, when MEETING_INTELLIGENCE_MEDIA_PROVIDER_URL is configured; they return clear provider-not-configured, unsupported-media, missing/expired-storage, or provider-failure states otherwise. S3/R2-backed deployments can use the direct or multipart upload session endpoints for large provider files so file bytes go directly from the browser to private object storage before the intake is queued. Northstar includes an internal provider-compatible `/api/internal/meeting-intelligence/media-extract` route that can use OpenAI for image/whiteboard extraction and audio transcription when configured; that internal route does not yet process scanned PDFs or video. Relationship Brief proposals are deterministic by default; setting MEETING_INTELLIGENCE_RELATIONSHIP_PROVIDER=openai with OPENAI_API_KEY enables semantic matched-contact enrichment with sensitivity guidance while keeping review-first fallback. Relationship Brief review can carry optional fact-level include/edit/field-selection metadata, duplicate markers, and staleness warnings before apply. PPTX and XLSX return clear conversion-required failures until a direct local parser exists.
      properties:
        explicitSourceType:
          type: string
          enum: [pasted_text, markdown, text_file, rtf, html, csv, json, pdf, docx, pptx, xlsx, image, audio, video, unsupported]
        originalFilename:
          type: string
          nullable: true
        originalMimeType:
          type: string
          nullable: true
        contextText:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
        fileText:
          type: string
          nullable: true
        fileBase64:
          type: string
          nullable: true
          description: Base64-encoded file bytes for bounded local PDF/DOCX extraction or fallback provider-backed image/scanned-PDF/audio/video ingestion. Local processors consume bounded bytes synchronously. Provider-backed bytes are copied into the configured private Meeting Intelligence file storage backend before the background job is queued, and new job payloads store a file reference instead of this base64 value. For large S3/R2-backed provider files, prefer the direct or multipart upload session endpoints so bytes do not enter the app request body.
        hints:
          type: object
          additionalProperties: true
    MeetingIntakeApplyInput:
      type: object
      description: Edited/selected proposal payload. Only selected updates are applied through existing note/activity services. Proposal targets may be reassigned to known CRM records or cleared; unavailable, locked, deleted, or cross-workspace targets are skipped with clear reasons.
      properties:
        meetingActivity:
          type: object
          nullable: true
          additionalProperties: true
        notes:
          type: array
          items:
            type: object
            additionalProperties: true
        nextStepActivities:
          type: array
          items:
            type: object
            additionalProperties: true
    MeetingIntakeUploadSessionInput:
      type: object
      required: [byteLength, sha256]
      description: Creates an authenticated direct-to-object-storage upload session for large S3/R2-backed Meeting Intelligence provider files. The server creates a draft intake and returns only browser upload instructions, not credentials or stored-file internals. Local filesystem storage and unsupported provider/source configurations fail clearly so clients can use the bounded base64 fallback path.
      properties:
        byteLength:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: "^[A-Fa-f0-9]{64}$"
        explicitSourceType:
          type: string
          enum: [pdf, image, audio, video]
          nullable: true
        originalFilename:
          type: string
          nullable: true
        originalMimeType:
          type: string
          nullable: true
    MeetingIntakeUploadSessionFinalizeInput:
      type: object
      required: [byteLength, sha256]
      description: Finalizes a direct upload by validating completion metadata and the private object through the stored-file backend before queueing provider extraction from a stored-file reference. The request does not include file bytes. Size and checksum mismatches return distinct error codes, and a repeated finalize after queueing returns a controlled 409 without creating a duplicate extraction job.
      properties:
        byteLength:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: "^[A-Fa-f0-9]{64}$"
        explicitSourceType:
          type: string
          enum: [pdf, image, audio, video]
          nullable: true
        originalFilename:
          type: string
          nullable: true
        originalMimeType:
          type: string
          nullable: true
        contextText:
          type: string
          nullable: true
        hints:
          type: object
          additionalProperties: true
    MeetingIntakeUploadCapabilities:
      type: object
      description: Safe authenticated Meeting Intelligence upload policy for the current workspace/environment. Includes storage backend category, direct-upload availability, multipart availability and part policy, max sizes, provider support by source type, local extraction source types, unsupported source guidance, and retention. It must not include credentials, provider URLs/tokens, bucket names, signed URLs, local paths, object keys, stored-file references, filenames, or file payloads.
      properties:
        storage:
          type: object
          properties:
            backendCategory:
              type: string
              enum: [local-filesystem, s3-compatible]
            directUploadSupported:
              type: boolean
            private:
              type: boolean
            retentionDays:
              type: integer
        directUpload:
          type: object
          properties:
            available:
              type: boolean
            minBytes:
              type: integer
            maxBytes:
              type: integer
            sourceTypes:
              type: array
              items:
                type: string
                enum: [pdf, image, audio, video]
            reason:
              type: string
              nullable: true
        base64Request:
          type: object
          properties:
            available:
              type: boolean
            maxEncodedCharacters:
              type: integer
            maxDecodedBytes:
              type: integer
            providerFallbackMaxBytes:
              type: integer
        localExtraction:
          type: object
          properties:
            sourceTypes:
              type: array
              items:
                type: string
            maxBinaryBytes:
              type: integer
            maxTextCharacters:
              type: integer
        providerExtraction:
          type: object
          additionalProperties: true
        multipartUpload:
          type: object
          properties:
            supported:
              type: boolean
            abortSupported:
              type: boolean
            minBytes:
              type: integer
            maxBytes:
              type: integer
            partSizeBytes:
              type: integer
            maxParts:
              type: integer
            sourceTypes:
              type: array
              items:
                type: string
                enum: [pdf, image, audio, video]
            reason:
              type: string
              nullable: true
            cleanup:
              type: string
        unsupportedSourceTypes:
          type: array
          items:
            type: object
            additionalProperties: true
        guidance:
          type: object
          additionalProperties:
            type: string
    MeetingIntakeUploadSession:
      type: object
      properties:
        uploadSessionId:
          type: string
        intakeId:
          type: string
        acceptedSourceType:
          type: string
          enum: [pdf, image, audio, video]
        maxBytes:
          type: integer
        provider:
          type: object
          additionalProperties: true
        upload:
          type: object
          properties:
            method:
              type: string
              enum: [PUT]
            url:
              type: string
              description: Short-lived signed object-storage URL. It may contain provider-required signed query parameters and object path information but never storage credentials or secrets.
            headers:
              type: object
              additionalProperties:
                type: string
            expiresAt:
              type: string
              format: date-time
    MeetingIntakeMultipartUploadSession:
      type: object
      properties:
        uploadSessionId:
          type: string
        intakeId:
          type: string
        acceptedSourceType:
          type: string
          enum: [pdf, image, audio, video]
        multipart:
          type: object
          properties:
            abortSupported:
              type: boolean
            expiresAt:
              type: string
              format: date-time
              description: Stored-file retention expiry for the incomplete multipart session.
            maxParts:
              type: integer
            partCount:
              type: integer
            partSizeBytes:
              type: integer
            signPartExpiresInSeconds:
              type: integer
    MeetingIntakeMultipartUploadPartsInput:
      type: object
      required: [partNumbers]
      properties:
        partNumbers:
          type: array
          items:
            type: integer
            minimum: 1
    MeetingIntakeMultipartUploadParts:
      type: object
      properties:
        uploadSessionId:
          type: string
        parts:
          type: array
          items:
            type: object
            properties:
              partNumber:
                type: integer
              expiresAt:
                type: string
                format: date-time
              upload:
                type: object
                properties:
                  method:
                    type: string
                    enum: [PUT]
                  url:
                    type: string
                    description: Short-lived signed object-storage URL scoped to one multipart part. It may contain provider-required signed query parameters and object path information but never storage credentials or secrets.
                  headers:
                    type: object
                    additionalProperties:
                      type: string
    MeetingIntakeMultipartUploadCompleteInput:
      allOf:
        - $ref: "#/components/schemas/MeetingIntakeUploadSessionFinalizeInput"
        - type: object
          required: [parts]
          properties:
            parts:
              type: array
              items:
                type: object
                required: [partNumber, etag]
                properties:
                  partNumber:
                    type: integer
                    minimum: 1
                  etag:
                    type: string
    ProductInput:
      type: object
      required: [name, unitPriceCents]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        unitPriceCents:
          type: integer
          minimum: 0
          maximum: 2147483647
        currency:
          type: string
          default: USD
    ActivityInput:
      type: object
      description: Activity follow-ups must attach to at least one Deal, Lead, Contact/Person, or Organization in the workspace.
      required: [type, title]
      properties:
        ownerId:
          type: string
          nullable: true
        dealId:
          type: string
          nullable: true
        leadId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        type:
          type: string
          enum: [CALL, EMAIL, MEETING, TASK]
        title:
          type: string
        description:
          type: string
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
    NoteInput:
      type: object
      description: Notes must attach to at least one Deal, Lead, Contact/Person, or Organization in the workspace.
      required: [body]
      properties:
        dealId:
          type: string
          nullable: true
        leadId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        body:
          type: string
    EmailLogInput:
      type: object
      required: [subject, body, direction, occurredAt]
      description: Manual email logging only. This does not send email, sync inboxes, process inbound email, or create background jobs.
      properties:
        dealId:
          type: string
          nullable: true
        leadId:
          type: string
          nullable: true
        personId:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        subject:
          type: string
        body:
          type: string
        direction:
          type: string
          enum: [INBOUND, OUTBOUND]
        occurredAt:
          type: string
          format: date-time
        fromText:
          type: string
          nullable: true
        toText:
          type: string
          nullable: true
        ccText:
          type: string
          nullable: true
    EmailTemplateInput:
      type: object
      required: [name, subject, body]
      description: Workspace-scoped reusable text for manual email logs only. No sending or merge variables are implemented.
      properties:
        name:
          type: string
        subject:
          type: string
        body:
          type: string
    CustomFieldInput:
      type: object
      required: [entityType, name, key, fieldType]
      description: MVP custom field definition creation is limited to Deal, Contact/Person, Organization, and Lead fields.
      properties:
        entityType:
          type: string
          enum: [DEAL, PERSON, ORGANIZATION, LEAD]
        name:
          type: string
        key:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        fieldType:
          type: string
          enum: [TEXT, NUMBER, DATE, BOOLEAN, SELECT]
          description: Single-select fields are validated against configured string options when options are provided. Future unsupported definitions remain read-only.
        required:
          type: boolean
        options:
          nullable: true
    CustomFieldDefinition:
      type: object
      properties:
        id:
          type: string
        workspaceId:
          type: string
        entityType:
          type: string
          enum: [DEAL, LEAD, PERSON, ORGANIZATION]
        name:
          type: string
        key:
          type: string
        fieldType:
          type: string
          enum: [TEXT, NUMBER, DATE, BOOLEAN, SELECT, MULTI_SELECT, URL]
        required:
          type: boolean
        options:
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CustomFieldValuesInput:
      type: object
      required: [entityType, entityId, values]
      description: Updates custom field values for one Deal, Contact/Person, Organization, or unconverted Lead record.
      properties:
        entityType:
          type: string
          enum: [DEAL, PERSON, ORGANIZATION, LEAD]
        entityId:
          type: string
          description: Deal ID when entityType is DEAL, Contact/Person ID when entityType is PERSON, Organization ID when entityType is ORGANIZATION, or Lead ID when entityType is LEAD.
        values:
          type: object
          additionalProperties: true
          description: Map of custom field definition IDs to values.
      example:
        entityType: LEAD
        entityId: lead_123
        values:
          field_text_123: "High urgency"
          field_number_123: 42
          field_date_123: "2026-07-15"
          field_boolean_123: true
  responses:
    Ok:
      description: Successful response.
    Created:
      description: Created response.
    NoContent:
      description: No content.
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
paths:
  /workspaces:
    get:
      summary: List workspaces for the actor
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}:
    get:
      summary: Get a workspace
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
  /workspaces/{workspaceId}/pipelines:
    get:
      summary: List pipelines with stages and stage deals
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/pipelines/{pipelineId}:
    patch:
      summary: Update a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineInput"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      summary: Soft delete a pipeline
      description: Returns a conflict while active deals still reference the pipeline.
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "409":
          $ref: "#/components/responses/Error"
  /workspaces/{workspaceId}/pipelines/{pipelineId}/stages:
    get:
      summary: List stages for a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    post:
      summary: Create a stage in a pipeline
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/PipelineId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageInput"
      responses:
        "201":
          $ref: "#/components/responses/Created"
  /workspaces/{workspaceId}/stages/{stageId}:
    patch:
      summary: Update a stage
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/StageId"
      requestBody:
        content:
          application/json:
